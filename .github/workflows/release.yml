name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $pkgVersion = (node -p "require('./package.json').version").Trim()
          $tag = "${{ github.ref_name }}"
          if ($tag -ne "v$pkgVersion") {
            throw "Tag '$tag' must match package.json version 'v$pkgVersion'."
          }

      - name: Install dependencies
        run: npm ci

      - name: Build and publish NSIS release
        run: |
          npm run build
          npm run build:icon
          npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
